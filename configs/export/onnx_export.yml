export:
  format: onnx
  precision: fp32
  opset: 17
  input:
    layout: nchw
    shape: [1, 3, 640, 640]
    dtype: float32
    color: rgb
    resize: letterbox
    normalize: none
  checks:
    onnx_checker: true
    onnxruntime_cpu: true
    compare_training_framework: true
    tolerance: 0.001

