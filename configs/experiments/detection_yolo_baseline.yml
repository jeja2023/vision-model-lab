experiment:
  id: person_detector_20260603_001
  task: detection
  project: cross_camera_tracking
  status: planned
  seed: 42

dataset:
  name: person_detection_dataset
  version: 1.0.0
  train_manifest: data/manifests/person_detection_train_v1.jsonl
  val_manifest: data/manifests/person_detection_val_v1.jsonl
  test_manifest: data/manifests/person_detection_test_v1.jsonl

model:
  architecture: yolov8n
  version: 1.0.0
  pretrained: true
  input_size: [640, 640]

labels:
  - person

training:
  adapter: detection_yolo_baseline
  epochs: 100
  batch_size: 16
  optimizer: adamw
  learning_rate: 0.001
  augmentation:
    mosaic: true
    hsv: true
    flip: true

evaluation:
  adapter: detection_yolo_baseline
  primary_metric: map50
  expected_metrics:
    map50: 0.01
    precision: 0.01
    recall: 0.01
  required_sets:
    - val
    - test
    - regression
    - edge

export:
  adapter: detection_yolo_baseline
  artifact_name: person_detector_yolov8n_v1.0.0_fp32.onnx
  format: onnx
  precision: fp32
  dynamic_batch: false
