name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend
        run: python -m pip install -e ".[dev]"
      - name: Test backend and contracts
        run: |
          export PYTHONDONTWRITEBYTECODE=1
          python -m pytest
          python scripts/acceptance_check.py --skip-pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Check for mojibake in source strings
        # 阻止非 UTF-8 编辑器保存造成的中文乱码（字符串字面量内出现连续问号）再次入库。
        run: |
          if grep -rnP '"[^"\n]*\?\?\?[^"\n]*"' --include='*.ts' --include='*.tsx' src; then
            echo "发现疑似乱码字符串（连续问号字面量），请检查文件编码。"
            exit 1
          fi
      - name: Install frontend
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Audit frontend (production deps only)
        run: npm audit --omit=dev --audit-level=high

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t vision-model-lab:ci .
